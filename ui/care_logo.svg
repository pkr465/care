<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 120">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1B2A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1B2838;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00BCD4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#26C6DA;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="codeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00BCD4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0097A7;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background rounded rect -->
  <rect x="0" y="0" width="480" height="120" rx="16" ry="16" fill="url(#bgGrad)" />

  <!-- Code bracket icon -->
  <g transform="translate(24, 20)">
    <!-- Left bracket -->
    <path d="M30 10 L12 40 L30 70" stroke="url(#codeGrad)" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Right bracket -->
    <path d="M50 10 L68 40 L50 70" stroke="url(#codeGrad)" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Checkmark inside -->
    <path d="M30 38 L38 48 L54 28" stroke="#4CAF50" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- CARE text -->
  <text x="120" y="72" font-family="SF Pro Display, Helvetica Neue, Arial, sans-serif" font-size="52" font-weight="800" letter-spacing="6" fill="#E0E0E0">
    CARE
  </text>

  <!-- Subtitle -->
  <text x="120" y="98" font-family="SF Pro Text, Helvetica Neue, Arial, sans-serif" font-size="13" font-weight="500" letter-spacing="3" fill="#80DEEA">
    CODEBASE ANALYSIS &amp; REFACTOR ENGINE
  </text>

  <!-- Accent line -->
  <rect x="120" y="78" width="320" height="2" rx="1" fill="url(#accentGrad)" opacity="0.5"/>
</svg>
